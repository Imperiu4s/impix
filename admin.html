<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="impixlogo.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="movies.css">
    <link rel="stylesheet" href="admin.css">
    <script type="module" src="admin.js"></script>
    <title>Impix | Admin</title>
</head>

<body>

    <div id="admin-gate" class="login-overlay">
        <div class="login-box">
            <div class="admin-shield-icon">
                <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2l8 4v6c0 5-3.5 8.5-8 10-4.5-1.5-8-5-8-10V6l8-4z"></path>
                    <path d="M9.5 12l2 2 4-4"></path>
                </svg>
            </div>
            <h1 class="login-logo">IMPIX</h1>
            <span class="admin-pill">ADMIN HOZZÁFÉRÉS</span>
            <h2>Belépés</h2>
            <p class="login-error hidden" id="admin-error-msg">Helytelen admin jelszó!</p>
            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="admin-password-input" placeholder="Admin jelszó">
            </div>
            <button class="login-btn" onclick="checkAdminPassword()">Belépés</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <nav class="nav">
            <a href="index.html" class="logo-link"><img src="assets/impixlogo2.png" class="implogo" alt="Impix logó"></a>
            <div class="admin-nav-title">Tartalomkezelő</div>
            <div class="nav-actions">
                <a href="index.html" class="logout-btn admin-back-link">Vissza az oldalra</a>
            </div>
        </nav>

        <main class="container admin-container">
            <div id="import-banner" class="admin-banner hidden">
                <p>Még nincs tartalom a Firebase adatbázisban. Importálhatod egy kattintással az eredeti katalógust kiindulásnak:</p>
                <button class="hero-btn hero-btn-play" onclick="importExistingCatalog()">Katalógus importálása</button>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" id="tab-btn-movies" onclick="switchTab('movies')">Filmek</button>
                <button class="admin-tab" id="tab-btn-series" onclick="switchTab('series')">Sorozatok</button>
            </div>

            <section id="tab-movies" class="admin-tab-panel">
                <div class="admin-form-card">
                    <h3 id="movie-form-title">Új film hozzáadása</h3>
                    <form id="movie-form">
                        <input type="hidden" id="movie-edit-id">
                        <div class="admin-form-grid">
                            <label>Cím
                                <input type="text" id="movie-title" required>
                            </label>
                            <label>Évszám
                                <input type="text" id="movie-year" placeholder="2026" required>
                            </label>
                            <label>Korhatár
                                <input type="text" id="movie-age" placeholder="16+" required>
                            </label>
                            <label>Videa.hu embed link
                                <input type="url" id="movie-iframe" placeholder="https://videa.hu/player?v=..." required>
                            </label>
                        </div>
                        <label>Leírás
                            <textarea id="movie-desc" rows="3" required></textarea>
                        </label>
                        <div class="admin-thumb-row">
                            <label>Borítókép URL
                                <input type="text" id="movie-thumb-url" placeholder="assets/pelda.png">
                            </label>
                            <label>...vagy tölts fel képet
                                <input type="file" id="movie-thumb-file" accept="image/*">
                            </label>
                        </div>
                        <label class="admin-checkbox">
                            <input type="checkbox" id="movie-isnew"> Megjelenjen az "Újdonságok" sorban
                        </label>
                        <div class="admin-form-actions">
                            <button type="submit" class="hero-btn hero-btn-play">Mentés</button>
                            <button type="button" class="theme-toggle-btn hidden" id="movie-cancel-edit">Mégse</button>
                        </div>
                        <p id="movie-form-status" class="admin-form-status"></p>
                    </form>
                </div>

                <div id="movies-list" class="admin-list"></div>
            </section>

            <section id="tab-series" class="admin-tab-panel hidden">
                <div class="admin-form-card">
                    <h3 id="series-form-title">Új sorozat hozzáadása</h3>
                    <form id="series-form">
                        <input type="hidden" id="series-edit-id">
                        <div class="admin-form-grid">
                            <label>Cím
                                <input type="text" id="series-title" required>
                            </label>
                            <label>Évszám
                                <input type="text" id="series-year" placeholder="2026" required>
                            </label>
                            <label>Korhatár
                                <input type="text" id="series-age" placeholder="16+" required>
                            </label>
                        </div>
                        <label>Leírás
                            <textarea id="series-desc" rows="3" required></textarea>
                        </label>
                        <div class="admin-thumb-row">
                            <label>Borítókép URL
                                <input type="text" id="series-thumb-url" placeholder="assets/pelda.png">
                            </label>
                            <label>...vagy tölts fel képet
                                <input type="file" id="series-thumb-file" accept="image/*">
                            </label>
                        </div>
                        <label class="admin-checkbox">
                            <input type="checkbox" id="series-isnew"> Megjelenjen az "Újdonságok" sorban
                        </label>
                        <div class="admin-form-actions">
                            <button type="submit" class="hero-btn hero-btn-play">Mentés</button>
                            <button type="button" class="theme-toggle-btn hidden" id="series-cancel-edit">Mégse</button>
                        </div>
                        <p id="series-form-status" class="admin-form-status"></p>
                    </form>
                </div>

                <div id="series-list" class="admin-list"></div>
            </section>
        </main>
    </div>

</body>

</html>
