<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="impixlogo.ico">
    <link rel="stylesheet" href="movies.css">
    <script type="module" src="script.js"></script>
    <title>Impix | imperius.hu</title>
</head>

<body>

    <div id="login-gate" class="login-overlay">
        <div class="login-box">
            <h1 class="login-logo">IMPIX</h1>
            <h2>Bejelentkezés</h2>
            <p>Az Imperiussss Community VIP tagjainak lehetőségük van filmekhez/sorozatokhoz hozzáférniük. Csatlakozz te
                is: <a href="https://discord.gg/nnAnbgt9sz" target="_blank" class="dclink">dc.imperius.hu</a></p>
            <p class="login-error hidden" id="login-error-msg">Helytelen jelszó! Próbáld újra.</p>
            <div class="input-group">
                <input type="password" id="password-input" placeholder="Jelszó">
            </div>
            <button class="login-btn" onclick="checkPassword()">Belépés</button>
        </div>
    </div>

    <nav class="nav">
        <a href="https://impix.hu"><img src="assets/impixlogo2.png" class="implogo"></a>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Keresés cím alapján..." oninput="handleSearch()">
            <button id="search-clear-btn" class="search-clear-btn hidden" onclick="clearSearch()">&times;</button>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-btn">Világos mód</button>
        <button class="logout-btn" onclick="handleLogout()">Kijelentkezés</button>
    </nav>

    <main class="container">
        <section class="category-section">
            <h2 class="category-title">Újdonságok az Impixen</h2>
            <div id="new-releases-grid" class="grid"></div>
        </section>

        <section class="section-group">
            <h2 class="category-title">Filmek</h2>
            <div id="movie-grid" class="grid"></div>
        </section>

        <section class="section-group">
            <h2 class="category-title">Sorozatok</h2>
            <div id="series-grid" class="grid"></div>
        </section>
    </main>

    <div id="modal" class="modal-overlay hidden">
        <div class="modal-window">
            <button class="close-btn" onclick="closeModal()">✕</button>

            <div class="video-container" id="video-container">
                <iframe id="player" class="player-frame" src="" allowfullscreen></iframe>
                <div id="video-shield" class="player-protected-overlay"></div>
                <div class="video-gradient-bottom"></div>
            </div>

            <div class="modal-body-content">
                <div class="info-left-side">
                    <h2 id="modal-title" class="movie-main-title"></h2>
                    <div class="movie-meta-tags">
                        <span id="modal-year" class="meta-tag-year">2024</span>
                        <span id="modal-age" class="meta-tag-age">16+</span>
                        <span class="meta-tag-hd">HD</span>
                    </div>
                    <p id="modal-description" class="movie-synopsis"></p>
                </div>

                <div class="info-right-side">
                    <div id="selector-box" class="custom-select-wrapper"></div>
                    <div id="ep-list" class="episode-vertical-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <div id="impix-alert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div class="custom-alert-header">
                <span class="custom-alert-logo">IMPIX</span> ÉRTESÍTÉS
            </div>
            <div id="impix-alert-message" class="custom-alert-body">
            </div>
            <div class="custom-alert-footer">
                <button id="impix-alert-btn" class="custom-alert-close-btn">OK</button>
            </div>
        </div>
    </div>
</body>

</html>
